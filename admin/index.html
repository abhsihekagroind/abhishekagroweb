<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Abhishek Agro</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-dark: #0A3D2F;
            --primary-green: #1E6B52;
            --primary-gold: #D4AF37;
            --primary-light: #F5F5E9;
            --white: #FFFFFF;
            --error: #dc3545;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0A3D2F, #1E6B52);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 450px;
        }

        .login-box {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo i {
            font-size: 3rem;
            color: var(--primary-gold);
            background: rgba(212, 175, 55, 0.1);
            width: 80px;
            height: 80px;
            line-height: 80px;
            border-radius: 50%;
            margin-bottom: 15px;
        }

        .logo h2 {
            font-size: 1.8rem;
            color: var(--primary-dark);
            font-weight: 700;
        }

        .logo h2 span {
            color: var(--primary-gold);
        }

        .logo p {
            color: #666;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--primary-dark);
            font-size: 0.9rem;
        }

        .input-group {
            position: relative;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary-gold);
            font-size: 1.1rem;
        }

        .input-group input {
            width: 100%;
            padding: 15px 15px 15px 45px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--primary-gold);
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.1);
        }

        #recaptcha-container {
            margin: 25px 0;
            display: flex;
            justify-content: center;
            min-height: 78px;
        }

        .login-btn {
            width: 100%;
            padding: 16px;
            background: var(--primary-gold);
            color: var(--primary-dark);
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s ease;
            margin-bottom: 15px;
        }

        .login-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.3);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .error-message {
            background: rgba(220, 53, 69, 0.1);
            color: var(--error);
            padding: 12px;
            border-radius: 8px;
            font-size: 0.9rem;
            text-align: center;
            margin-bottom: 15px;
            display: none;
        }

        .error-message.show {
            display: block;
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: var(--primary-dark);
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .security-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
            color: #666;
            font-size: 0.8rem;
        }

        .security-badge i {
            color: var(--primary-gold);
        }

        .info-text {
            text-align: center;
            color: #666;
            font-size: 0.8rem;
            margin-top: 20px;
        }

        .info-text i {
            color: var(--primary-gold);
            margin-right: 5px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="logo">
                <i class="fas fa-warehouse"></i>
                <h2>Abhishek <span>Agro</span></h2>
                <p>Admin Portal • Secure Access</p>
            </div>

            <!-- Error Message Display -->
            <div class="error-message" id="errorMessage"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <div class="input-group">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" placeholder="admin@abhishekagro.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>
                </div>

                <!-- reCAPTCHA Container -->
                <div id="recaptcha-container"></div>

                <button type="submit" class="login-btn" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i>
                    <span>Login to Dashboard</span>
                </button>

                <div class="security-badge">
                    <i class="fas fa-shield-alt"></i>
                    <span>Protected by Google reCAPTCHA</span>
                    <i class="fas fa-lock"></i>
                </div>
            </form>

            <div class="info-text">
                <i class="fas fa-clock"></i>
                Session expires after 30 minutes of inactivity
            </div>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-firestore-compat.js"></script>
    
    <!-- Your Firebase Config -->
    <script src="../js/firebase-config.js"></script>

    <!-- Google reCAPTCHA -->
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Page loaded with Firebase project:', 'abhishek-agro-admin');
            
            let recaptchaVerifier;
            let isRecaptchaReady = false;
            
            // Initialize reCAPTCHA
            try {
                recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', {
                    'size': 'normal',
                    'callback': (response) => {
                        console.log('reCAPTCHA verified');
                        document.getElementById('loginBtn').disabled = false;
                        hideError();
                    },
                    'expired-callback': () => {
                        console.log('reCAPTCHA expired');
                        document.getElementById('loginBtn').disabled = true;
                        showError('reCAPTCHA expired. Please check the box again.');
                    }
                });
                
                recaptchaVerifier.render().then((widgetId) => {
                    console.log('reCAPTCHA rendered');
                    window.recaptchaWidgetId = widgetId;
                    isRecaptchaReady = true;
                }).catch(error => {
                    console.error('reCAPTCHA render error:', error);
                    showError('Failed to load security check. Please refresh.');
                });
                
            } catch (error) {
                console.error('reCAPTCHA init error:', error);
                showError('Security initialization failed');
            }

            function showError(message) {
                const errorDiv = document.getElementById('errorMessage');
                errorDiv.textContent = message;
                errorDiv.classList.add('show');
                setTimeout(() => errorDiv.classList.remove('show'), 5000);
            }

            function hideError() {
                document.getElementById('errorMessage').classList.remove('show');
            }

            // Login form submission
            document.getElementById('loginForm').addEventListener('submit', async function(e) {
                e.preventDefault();
                
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                const loginBtn = document.getElementById('loginBtn');
                
                if (!email || !password) {
                    showError('Please enter both email and password');
                    return;
                }
                
                if (!isRecaptchaReady) {
                    showError('Please wait for security check to load');
                    return;
                }
                
                // Check reCAPTCHA
                const recaptchaResponse = grecaptcha.getResponse(window.recaptchaWidgetId);
                if (!recaptchaResponse) {
                    showError('Please complete the security check');
                    return;
                }
                
                // Disable button
                loginBtn.disabled = true;
                loginBtn.innerHTML = '<span class="loading-spinner"></span> Verifying...';
                
                try {
                    console.log('Attempting login for:', email);
                    
                    // Sign in
                    const userCredential = await auth.signInWithEmailAndPassword(email, password);
                    
                    console.log('Login successful for:', userCredential.user.email);
                    
                    // Redirect to dashboard
                    window.location.href = 'dashboard.html';
                    
                } catch (error) {
                    console.error('Login error:', error);
                    
                    // Reset reCAPTCHA
                    if (window.recaptchaWidgetId) {
                        grecaptcha.reset(window.recaptchaWidgetId);
                    }
                    
                    let errorMessage = 'Login failed. Please try again.';
                    if (error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password') {
                        errorMessage = 'Invalid email or password';
                    } else if (error.code === 'auth/too-many-requests') {
                        errorMessage = 'Too many attempts. Try again later.';
                    } else if (error.code === 'auth/network-request-failed') {
                        errorMessage = 'Network error. Check connection.';
                    }
                    
                    showError(errorMessage);
                    
                    // Re-enable button
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login to Dashboard';
                }
            });

            // Check if already logged in
            auth.onAuthStateChanged(user => {
                if (user) {
                    console.log('Already logged in as:', user.email);
                    window.location.href = 'dashboard.html';
                }
            });
        });
    </script>
</body>
</html>
